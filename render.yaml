# ============================================================
# Next Chapter Travel — Render Blueprint
# https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Connect this repo in Render dashboard
#   2. Render detects render.yaml and creates the service
#   3. Set the required environment variables listed below
#      in Render → Service → Environment
#   4. After first deploy, copy the Render service URL and
#      set BACKEND_URL in Netlify → Site config → Environment
# ============================================================

services:
  - type: web
    name: nextchapter-travel-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon          # us-west-2 — change to match your users
    plan: free              # upgrade to starter ($7/mo) for always-on
    healthCheckPath: /api/trpc/auth.me
    autoDeploy: true        # redeploy on every push to main

    envVars:
      # ── Required ─────────────────────────────────────────
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false         # Set manually in Render dashboard
        # Format: mysql://user:password@host:3306/dbname
        # Use PlanetScale, TiDB Cloud, or any MySQL-compatible host

      - key: JWT_SECRET
        generateValue: true # Render auto-generates a secure random value

      - key: VITE_APP_ID
        sync: false         # Copy from Manus project settings

      - key: OAUTH_SERVER_URL
        value: https://api.manus.im

      - key: OWNER_OPEN_ID
        sync: false         # Your Manus user open_id

      - key: BUILT_IN_FORGE_API_URL
        sync: false         # Copy from Manus project settings

      - key: BUILT_IN_FORGE_API_KEY
        sync: false         # Copy from Manus project settings

      - key: RESEND_API_KEY
        sync: false         # Your Resend API key for invite emails

      # ── Optional / Storage ────────────────────────────────
      - key: AWS_ACCESS_KEY_ID
        sync: false         # For S3 document vault (if using external S3)

      - key: AWS_SECRET_ACCESS_KEY
        sync: false

      - key: AWS_S3_BUCKET
        sync: false

      - key: AWS_REGION
        value: us-east-1
