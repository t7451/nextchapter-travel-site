<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <!-- Mobile-first viewport with safe area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- App identity -->
    <title>Next Chapter Travel — Jessica Seiders</title>
    <meta name="description" content="Your personal travel portal — manage your trip itinerary, documents, packing list, and stay connected with Jessica Seiders, your certified travel advisor." />
    <meta name="theme-color" content="#1a2744" />

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NCT Travel" />

    <!-- Open Graph -->
    <meta property="og:title" content="Next Chapter Travel — Jessica Seiders" />
    <meta property="og:description" content="Your personal travel portal. Manage your trip, documents, and stay connected with your travel advisor." />
    <meta property="og:type" content="website" />

    <!-- Google Fonts: Playfair Display + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const endpoint = import.meta.env.VITE_ANALYTICS_ENDPOINT;
      const siteId = import.meta.env.VITE_ANALYTICS_WEBSITE_ID;
      if (endpoint && siteId) {
        const s = document.createElement('script');
        s.src = `${endpoint}/umami`;
        s.defer = true;
        s.setAttribute('data-website-id', siteId);
        document.head.appendChild(s);
      }
    </script>
  </body>

</html>
